name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - dev
      - fix/**
      - bugfix/**
      - enhance/**
      - feat/**
  pull_request:
    branches:
      - main
      - dev
  workflow_call:
    outputs:
      version:
        description: "The version of the extension"
        value: ${{ jobs.build-and-test.outputs.version }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-build-container:latest

    outputs:
      version: ${{ steps.package_info.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: npm install --include dev

      - name: CI Pipeline
        run: npm run ci
        env:
          VSCODE_TEST_RESULTS_DIR: ${{ github.workspace }}/test-results
          POSTHOG_MOCK: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ${{ github.workspace }}/coverage/lcov.info
          fail_ci_if_error: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ${{ github.workspace }}/test-results/test-results.xml
          report_type: test_results
          fail_ci_if_error: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Get Package Info
        id: package_info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: litellm-connector-copilot-${{ steps.package_info.outputs.version }}.vsix
          retention-days: 7

      - name: Upload Coverage Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            ${{ github.workspace }}/test-results/test-results.xml
            .vscode-test/user-data/logs
          retention-days: 7
